<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Fundo arredondado -->
  <rect width="64" height="64" rx="14" fill="#1a56db"/>

  <!-- Silhueta de pessoa (cliente) -->
  <circle cx="24" cy="20" r="7" fill="white" opacity="0.95"/>
  <path d="M10 42c0-7.7 6.3-14 14-14s14 6.3 14 14" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.95"/>

  <!-- Lista de tarefas (checklist) -->
  <rect x="36" y="14" width="18" height="3" rx="1.5" fill="white" opacity="0.85"/>
  <rect x="36" y="21" width="14" height="3" rx="1.5" fill="white" opacity="0.85"/>
  <rect x="36" y="28" width="16" height="3" rx="1.5" fill="white" opacity="0.85"/>

  <!-- Check mark na última linha -->
  <path d="M34 29.5 L36 32 L40 27" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Linha conectora: pessoa → lista -->
  <line x1="31" y1="36" x2="36" y2="30" stroke="white" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.5"/>
</svg>
